<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>What's Your Stink Level? — THE DEODORANT MAN</title>
<meta name="description" content="Do you stink? Can you even tell? Take the Stink Check. One swipe. I got you. 🧴 #StinkCheck" />
<meta property="og:title" content="What's Your Stink Level? 🧴" />
<meta property="og:description" content="Be honest. Do you stink? Take the Stink Check. I got you. #StinkCheck #IGotYou" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet" />
<style>
  :root{
    --gold:#E8B84B; --gold-2:#F5D27A; --ink:#0c0c0d; --ink-2:#161618;
    --line:rgba(232,184,75,.35); --muted:#9b9b9b; --green:#37d67a; --red:#ff5a52;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Noto Sans","Noto Sans Arabic","Noto Sans Devanagari",sans-serif;
    background:radial-gradient(120% 80% at 50% 0%, #1c1c20 0%, var(--ink) 55%, #050506 100%);
    color:#fff; min-height:100vh; min-height:100dvh; overflow-x:hidden;
    display:flex; align-items:flex-start; justify-content:center;
  }
  .wrap{width:100%; max-width:480px; padding:14px 18px 60px; position:relative}
  .langbar{display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin:2px 0 10px}
  .langbar button{background:#141417;border:1px solid #26262b;color:#cfcfcf;border-radius:99px;padding:6px 11px;font-size:13px;font-weight:700;cursor:pointer}
  .langbar button.on{background:#1d1a12;border-color:var(--gold);color:var(--gold)}
  .langhint{text-align:center; font-size:12.5px; line-height:1.5; color:var(--gold); margin:0 4px 14px}
  .langhint .lead{font-weight:800}
  .langhint .langnames{display:block; margin-top:3px; color:var(--muted); font-size:11.5px; letter-spacing:.02em}
  #introFine{font-family:'Anton',sans-serif; font-weight:400; letter-spacing:.04em; text-transform:uppercase;
    font-size:15px; line-height:1.35; color:transparent;
    background:linear-gradient(180deg,var(--gold-2),var(--gold)); -webkit-background-clip:text; background-clip:text}
  #introFine .shieldicon, .sub .shieldicon{height:1.15em; width:auto; vertical-align:-0.22em; margin-left:.15em;
    filter:drop-shadow(0 2px 5px rgba(0,0,0,.55))}
  .brand{display:flex; align-items:center; gap:9px; justify-content:center; margin:4px 0 16px}
  .brand .can{font-size:24px}
  .brand b{font-weight:800; letter-spacing:.06em; font-size:13px; color:var(--gold)}
  h1{font-size:30px; line-height:1.12; font-weight:900; text-align:center; margin:6px 0 4px; letter-spacing:-.01em}
  h1 .hl{color:var(--gold)}
  .sub{text-align:center; color:var(--muted); font-size:15px; line-height:1.5; margin:8px 4px 22px}
  .card{
    background:linear-gradient(180deg, var(--ink-2), #0e0e10);
    border:1px solid var(--line); border-radius:20px; padding:20px 18px;
    box-shadow:0 18px 50px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04);
  }
  .btn{display:block; width:100%; border:none; cursor:pointer; font-weight:800; font-size:17px; padding:16px 18px; border-radius:14px; margin-top:10px;
    background:linear-gradient(180deg,var(--gold-2),var(--gold)); color:#1a1304; box-shadow:0 8px 22px rgba(232,184,75,.28); transition:transform .08s ease}
  .btn:active{transform:translateY(1px) scale(.995)}
  .btn.secondary{background:transparent;color:var(--gold);border:1px solid var(--line);box-shadow:none}
  .opt{display:flex; align-items:center; gap:12px; width:100%; text-align:start; background:#141417; border:1px solid #26262b; color:#fff; cursor:pointer;
    padding:15px 15px; border-radius:13px; margin-top:10px; font-size:15.5px; font-weight:600; transition:border-color .12s, background .12s, transform .06s}
  .opt .emo{font-size:21px; flex:0 0 auto}
  .opt:active{transform:scale(.99)}
  .opt.sel{border-color:var(--gold); background:#1d1a12}
  .progress{height:6px; background:#1f1f23; border-radius:99px; overflow:hidden; margin:0 2px 16px}
  .progress > i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--gold),var(--gold-2)); transition:width .35s ease}
  .qnum{font-size:12.5px; letter-spacing:.12em; color:var(--gold); font-weight:800; text-transform:uppercase; margin:2px 2px 8px}
  .qtext{font-size:20px; font-weight:800; line-height:1.25; margin:0 2px 6px}
  .hidden{display:none !important}
  .meter{position:relative; width:170px; height:170px; margin:6px auto 4px}
  .meter svg{transform:rotate(-90deg)}
  .meter .num{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
  .meter .num b{font-size:54px; font-weight:900; line-height:1; color:#fff}
  .meter .num span{font-size:12px; color:var(--muted); margin-top:3px; text-align:center}
  .tier{font-size:23px; font-weight:900; text-align:center; margin:8px 0 2px}
  .verdict{text-align:center; color:#d9d9d9; font-size:15px; line-height:1.55; margin:6px 6px 4px}
  .callout{background:#15140e; border:1px solid var(--line); border-radius:13px; padding:13px 14px; margin:14px 0 4px; font-size:14px; line-height:1.55; color:#eecb78}
  .pssht{font-weight:900; color:var(--gold); letter-spacing:.04em}
  .field{width:100%; background:#101013; border:1px solid #2a2a30; color:#fff; font-size:16px; padding:15px 14px; border-radius:13px; margin-top:10px}
  .field:focus{outline:none; border-color:var(--gold)}
  .fine{font-size:11.5px; color:#6e6e72; text-align:center; margin:12px 6px 0; line-height:1.55}
  .row{display:flex; gap:10px}
  .row .btn{flex:1; margin-top:10px}
  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); background:var(--gold); color:#1a1304; font-weight:800; padding:12px 18px; border-radius:99px; opacity:0; transition:.25s; z-index:50; font-size:14px}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .footer{text-align:center; color:#55555a; font-size:12px; margin-top:26px; line-height:1.7}
  .footer b{color:var(--gold)}
  .spark{position:absolute; pointer-events:none; font-size:18px; animation:rise 1.1s ease-out forwards}
  @keyframes rise{from{opacity:1; transform:translateY(0) scale(1)} to{opacity:0; transform:translateY(-60px) scale(1.4)}}
  canvas{display:none}
  [dir="rtl"] .qnum{letter-spacing:0}
</style>
</head>
<body>
<div class="wrap">
  <div class="langbar" id="langbar"></div>
  <div class="langhint" id="langHint"></div>
  <div class="brand"><span class="can">🧴</span><b>THE DEODORANT MAN</b></div>

  <!-- INTRO -->
  <section id="intro">
    <h1 id="h1"></h1>
    <p class="sub" id="introSub"></p>
    <div class="card">
      <div class="qnum" id="introQ"></div>
      <button class="opt" data-vibe="self"><span class="emo">😅</span> <span class="vlbl" data-v="self"></span></button>
      <button class="opt" data-vibe="noseblind"><span class="emo">🤔</span> <span class="vlbl" data-v="noseblind"></span></button>
      <button class="opt" data-vibe="witness"><span class="emo">👀</span> <span class="vlbl" data-v="witness"></span></button>
      <button class="opt" data-vibe="silent"><span class="emo">🤐</span> <span class="vlbl" data-v="silent"></span></button>
    </div>
    <p class="fine" id="introFine"></p>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hidden">
    <div class="progress"><i id="bar"></i></div>
    <div class="card">
      <div class="qnum" id="qnum"></div>
      <div class="qtext" id="qtext"></div>
      <div id="opts"></div>
    </div>
    <button class="btn secondary" id="backBtn" style="margin-top:14px"></button>
  </section>

  <!-- RESULT -->
  <section id="result" class="hidden">
    <div class="card">
      <div class="meter">
        <svg width="170" height="170" viewBox="0 0 170 170">
          <circle cx="85" cy="85" r="74" fill="none" stroke="#1f1f23" stroke-width="13"/>
          <circle id="ring" cx="85" cy="85" r="74" fill="none" stroke="url(#g)" stroke-width="13" stroke-linecap="round" stroke-dasharray="465" stroke-dashoffset="465"/>
          <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#E8B84B"/><stop offset="1" stop-color="#F5D27A"/></linearGradient></defs>
        </svg>
        <div class="num"><b id="score">0</b><span id="scoreLbl"></span></div>
      </div>
      <div class="tier" id="tier"></div>
      <div class="verdict" id="verdict"></div>
      <div class="callout" id="callout"></div>
      <div class="row">
        <button class="btn" id="shareBtn"></button>
        <button class="btn secondary" id="cardBtn"></button>
      </div>
      <button class="btn secondary" id="retry" style="margin-top:10px"></button>
    </div>

    <div class="card" style="margin-top:16px">
      <div class="tier" style="font-size:19px" id="waitTitle"></div>
      <p class="verdict" id="waitBody"></p>
      <form id="waitForm">
        <input class="field" id="email" type="email" required />
        <button class="btn" id="joinBtn" type="submit"></button>
      </form>
      <p class="fine" id="waitFine"></p>
    </div>

    <div class="footer">
      <b>#StinkCheck</b> &nbsp;·&nbsp; <b>#IGotYou</b><br>
      THE DEODORANT MAN · @deodorantmangame<br>
      <span style="color:#3a3a3e" id="footNote"></span>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>
<canvas id="cv" width="1080" height="1080"></canvas>

/* ---------- State ---------- */
let cur="en", vibe=null, step=0, answers=[];
const SCORES=[0,2,3,4]; // option index -> points (same in every language)
const NQ=6, MAX=NQ*4;
const $=s=>document.querySelector(s);
const T=()=>LANG[cur];
const show=id=>{["intro","quiz","result"].forEach(s=>$("#"+s).classList.toggle("hidden", s!==id));window.scrollTo(0,0)};

/* ---------- Language bar ---------- */
function buildLangBar(){
  const bar=$("#langbar"); bar.innerHTML="";
  Object.keys(LANG).forEach(code=>{
    const b=document.createElement("button");
    b.textContent=LANG[code].name; b.className=code===cur?"on":"";
    b.onclick=()=>{ setLang(code); };
    bar.appendChild(b);
  });
}
function setLang(code){
  cur=code; document.documentElement.lang=code; document.documentElement.dir=LANG[code].dir;
  buildLangBar(); applyStatic();
  if(!$("#quiz").classList.contains("hidden")) renderQ();
  if(!$("#result").classList.contains("hidden") && window._result) renderResultText();
}
function applyStatic(){
  const t=T();
  $("#h1").innerHTML=t.h1; $("#introSub").innerHTML=t.sub; $("#introQ").textContent=t.introQ;
  $("#introFine").innerHTML=t.introFine.replace(/\s*🧴\s*$/,'').trim()+' <img class="shieldicon" src="../assets/shield-icon.png" alt="THE DEODORANT MAN" />';
  $("#langHint").innerHTML=t.langHint+'<span class="langnames">English · हिंदी · اردو · العربية · 中文 · Türkçe · Español · Français</span>';
  document.querySelectorAll(".vlbl").forEach(el=>el.innerHTML=t.vibes[el.dataset.v]);
  $("#backBtn").textContent=t.back; $("#scoreLbl").textContent=t.scoreLbl;
  $("#shareBtn").textContent=t.share; $("#cardBtn").textContent=t.save; $("#retry").textContent=t.retake;
  $("#waitTitle").textContent=t.waitTitle; $("#waitBody").innerHTML=t.waitBody;
  $("#email").placeholder=t.emailPh; $("#joinBtn").textContent=t.join; $("#waitFine").textContent=t.waitFine; $("#footNote").textContent=t.foot;
}

/* ---------- Intro ---------- */
document.querySelectorAll("#intro .opt").forEach(b=>{
  b.onclick=()=>{ vibe=b.dataset.vibe; step=0; answers=[]; show("quiz"); renderQ(); };
});

/* ---------- Quiz ---------- */
function renderQ(){
  const t=T(), Q=t.questions[step];
  $("#bar").style.width=((step)/NQ*100)+"%";
  $("#qnum").textContent=t.qof(step+1,NQ);
  $("#qtext").textContent=Q.q;
  const wrap=$("#opts"); wrap.innerHTML="";
  Q.a.forEach((label,i)=>{
    const el=document.createElement("button");
    el.className="opt"+(answers[step]===i?" sel":"");
    el.innerHTML='<span class="emo">'+["🟢","🟡","🟠","🔴"][i]+'</span> <span>'+label+'</span>';
    el.onclick=()=>{ answers[step]=i; next(); };
    wrap.appendChild(el);
  });
  $("#backBtn").style.visibility=step===0?"hidden":"visible";
}
function next(){ setTimeout(()=>{ if(step<NQ-1){step++;renderQ();} else finish(); },170); }
$("#backBtn").onclick=()=>{ if(step>0){step--;renderQ();} };

/* ---------- Result ---------- */
function tierIdx(pct){ return pct<=25?0:pct<=50?1:pct<=75?2:3; }
function finish(){
  const total=answers.reduce((s,a)=>s+SCORES[a],0);
  const pct=Math.round(total/MAX*100);
  const level=Math.max(1,Math.round(pct/10));
  window._result={level,pct,idx:tierIdx(pct)};
  $("#bar").style.width="100%"; show("result"); renderResultText();
  const ring=$("#ring"), dash=465;
  ring.style.transition="stroke-dashoffset 1s ease";
  ring.style.stroke=pct>75?"var(--red)":(pct>50?"#ff9f43":"url(#g)");
  setTimeout(()=>ring.style.strokeDashoffset=dash-(dash*pct/100),60);
  let n=0; const iv=setInterval(()=>{n++;$("#score").textContent=n;if(n>=level)clearInterval(iv);},60);
  for(let i=0;i<8;i++) setTimeout(spark,i*90);
}
function renderResultText(){
  const t=T(), r=window._result, tier=t.tiers[r.idx];
  $("#score").textContent=r.level;
  $("#tier").textContent=tier.t; $("#verdict").textContent=tier.v;
  const vl=t.vibeLines[vibe];
  $("#callout").innerHTML=(vl?"<b>"+vl+"</b><br><br>":"")+tier.c;
}

/* ---------- sparkles / toast ---------- */
function spark(){ const s=document.createElement("div"); s.className="spark"; s.textContent=["✨","🧴","💨"][Math.floor(step%3)];
  const m=$(".meter").getBoundingClientRect(); s.style.position="fixed";
  s.style.left=(m.left+m.width*0.5+(Math.random()*80-40))+"px"; s.style.top=(m.top+m.height*0.3)+"px";
  document.body.appendChild(s); setTimeout(()=>s.remove(),1100); }
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1900); }

/* ---------- share ---------- */
function shareStr(){ const t=T(),r=window._result||{level:0,idx:0}; return t.shareTpl(r.level, t.tiers[r.idx].t); }
$("#shareBtn").onclick=async()=>{
  const data={title:"Stink Level 🧴", text:shareStr(), url:CONFIG.SHARE_URL};
  try{
    const blob=await cardBlob();
    if(blob && navigator.canShare && navigator.canShare({files:[new File([blob],"stink.png",{type:"image/png"})]})){
      await navigator.share({...data, files:[new File([blob],"stink-level.png",{type:"image/png"})]}); return; }
    if(navigator.share){ await navigator.share(data); return; }
  }catch(e){}
  try{ await navigator.clipboard.writeText(shareStr()); toast(T().copied); }catch(e){ toast("📸"); }
};

/* ---------- card image ---------- */
function drawCard(){
  const t=T(), c=$("#cv"), x=c.getContext("2d"), r=window._result||{level:0,idx:0};
  x.fillStyle="#0a0a0b"; x.fillRect(0,0,1080,1080);
  x.strokeStyle="#E8B84B"; x.lineWidth=10; x.strokeRect(40,40,1000,1000);
  x.textAlign="center"; x.direction=t.dir;
  x.fillStyle="#E8B84B"; x.font="700 34px -apple-system,Segoe UI,Arial"; x.fillText(t.cardTop,540,150);
  x.fillStyle="#fff"; x.font="800 50px -apple-system,Segoe UI,Arial"; x.fillText(t.cardMid,540,290);
  x.fillStyle="#E8B84B"; x.font="900 300px -apple-system,Segoe UI,Arial"; x.fillText(r.level,540,640);
  x.fillStyle="#9b9b9b"; x.font="700 42px -apple-system,Segoe UI,Arial"; x.fillText("/ 10",540,710);
  x.fillStyle="#fff"; x.font="800 40px -apple-system,Segoe UI,Arial"; x.fillText(t.tiers[r.idx].t,540,825);
  x.fillStyle="#E8B84B"; x.font="700 32px -apple-system,Segoe UI,Arial"; x.fillText(t.cardAsk,540,915);
  x.fillStyle="#7a7a7e"; x.font="600 28px -apple-system,Segoe UI,Arial"; x.fillText("#StinkCheck  #IGotYou",540,975);
  return c;
}
function cardBlob(){ return new Promise(res=>{ try{ drawCard().toBlob(res,"image/png"); }catch(e){ res(null); } }); }
$("#cardBtn").onclick=()=>{ try{ const a=document.createElement("a"); a.href=drawCard().toDataURL("image/png"); a.download="my-stink-level.png"; a.click(); toast(T().saved); }catch(e){ toast("📸"); } };

/* ---------- retake ---------- */
$("#retry").onclick=()=>{ step=0; answers=[]; vibe=null; show("intro"); };

/* ---------- waitlist ---------- */
$("#waitForm").onsubmit=async(e)=>{
  e.preventDefault();
  const email=$("#email").value.trim(); if(!email) return;
  const r=window._result||{};
  $("#joinBtn").textContent="…";
  const payload={email, stink_level:r.level||"", tier:(T().tiers[r.idx]||{}).t||"", vibe:vibe||"", lang:cur, source:"stink-quiz"};
  try{
    if(CONFIG.WAITLIST_ENDPOINT.includes("PASTE_APPS_SCRIPT_URL")) throw new Error("no-endpoint");
    await fetch(CONFIG.WAITLIST_ENDPOINT,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
  }catch(err){
    try{ const l=JSON.parse(localStorage.getItem("dm_waitlist")||"[]"); l.push(payload); localStorage.setItem("dm_waitlist",JSON.stringify(l)); }catch(e){}
  }
  $("#waitForm").innerHTML='<div class="callout" style="color:#37d67a;border-color:rgba(55,214,122,.4)">'+T().done+'</div>';
};

/* ---------- boot: auto-detect language ---------- */
(function(){
  const nav=(navigator.language||"en").slice(0,2).toLowerCase();
  const map={en:"en",hi:"hi",ur:"ur",ar:"ar",zh:"zh",tr:"tr",es:"es",fr:"fr"};
  setLang(map[nav]||"en");
})();
</script>
</body>
</html>
